<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamin Global • Official Fanbase</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/all.min.css">
    <style>
        :root {
            --blue: #001f3f;
            --gold: #d4af37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--blue);
            color: white;
            line-height: 1.6;
        }
        header {
            height: 100vh;
            background: linear-gradient(rgba(0,31,63,0.75), rgba(0,31,63,0.75)), url('https://images.unsplash.com/photo-1514525253361-bee8718a340b?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            color: var(--gold);
        }
        .subtitle { font-size: 1.4rem; letter-spacing: 6px; margin: 20px 0 40px; }

        .btn {
            background: var(--gold);
            color: black;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
        }

        section { padding: 100px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        h2 {
            text-align: center;
            font-size: 2.8rem;
            color: var(--gold);
            margin-bottom: 60px;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .tier {
            background: rgba(255,255,255,0.08);
            padding: 40px 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.4s;
        }
        .tier.popular {
            border: 3px solid var(--gold);
            transform: scale(1.05);
        }

        .social-links {
            margin: 30px 0;
        }
        .social-links a {
            color: white;
            font-size: 1.8rem;
            margin: 0 15px;
            transition: 0.3s;
        }
        .social-links a:hover {
            color: var(--gold);
            transform: scale(1.3);
        }

        .contact {
            background: #000;
            text-align: center;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            background: #000;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <header>
        <h1>JAMIN GLOBAL</h1>
        <p class="subtitle">OFFICIAL FANBASE</p>
        <a href="#tiers" class="btn">Join The Family</a>
    </header>

    <!-- Membership Tiers -->
    <section id="tiers">
        <div class="container">
            <h2>Membership Tiers</h2>
            <div class="pricing-grid">
                <div class="tier">
                    <h3>Serendipity</h3>
                    <div class="price">$5<span>/mo</span></div>
                    <a href="https://wa.me/123" class="btn">Subscribe</a>
                </div>
                <div class="tier popular">
                    <h3>FILTER ELITE</h3>
                    <div class="price">$15<span>/mo</span></div>
                    <a href="https://wa.me/123" class="btn">Subscribe</a>
                </div>
                <div class="tier">
                    <h3>PROMISE GOLD</h3>
                    <div class="price">$45<span>/mo</span></div>
                    <a href="https://wa.me/123" class="btn">Subscribe</a>
                </div>
            </div>
        </div>
    </section>

    <section class="contact">
        <div class="container">
            <h2>Contact Jamin Global</h2>
            <p style="font-size:1.4rem; margin:30px 0;">We are always here for you</p>
            <a href="https://wa.me/123" class="btn" style="background:white; color:black;">Chat on WhatsApp</a>
        </div>
    </section>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/123" class="whatsapp-float" target="_blank">💬</a>

    <footer>
        <p>Follow Us</p>
        <div class="social-links">
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
        <p>&copy; 2026 Jamin Global Official Fanbase</p>
    </footer>

</body>
</html>
